<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxcars</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="head">
        <div class="head-container">
            <div class="headL">
                <img src="/assets/logo.svg" alt="logo">
                <div class="flex-row center-all" style="gap: 10px;">
                    <img src="/assets/phone.svg" alt="">
                    <span>+75 123 456 789</span>
                </div>

            </div>
            <div class="headC">
                <nav>
                    <ul>
                        <li><a href="">Home</a> <img src="/assets/arrow-down.svg" alt=""></li>
                        <li><a href="">Listings</a> <img src="/assets/arrow-down.svg" alt=""></li>
                        <li><a href="">Blog</a> <img src="/assets/arrow-down.svg" alt=""></li>
                        <li><a href="">Pages</a> <img src="/assets/arrow-down.svg" alt=""></li>
                        <li><a href="">About</a></li>
                        <li><a href="">Contact</a></li>
                        <li><img src="/assets/signin.svg" alt=""> <a href="">Sign in</a></li>
                    </ul>
                </nav>
            </div>
            <div class="headR">
                <button>Submit listing</button>
            </div>
        </div>
    </header>

    <section class="dream-car">
        <span>Find cars for sale and for rent near you</span>
        <h2>Find Your Dream Car</h2>
        <form action="#">
            <select name="car_type" id="cars">
                <option value="used cars">Used Cars</option>
                <option value="new cars">New Cars</option>
            </select>

            <select name="car_make" id="cars">
                <option value="any">Any Makes</option>
                <option value="volvo">Volvo</option>
                <option value="saab">Saab</option>
                <option value="opel">Opel</option>
                <option value="audi">Audi</option>
            </select>

            <select name="car_model" id="cars">
                <option value="any">Any Models</option>
                <option value="golf">Golf</option>
                <option value="troc">T-Roc</option>
                <option value="tcross">T-Cross</option>
            </select>

            <select name="car_price" id="cars">
                <option value="any">All Pricees</option>
                <option value="range1">Under 10000 €</option>
                <option value="range2">10000 - 50000 €</option>
                <option value="range3">Over 50000 €</option>
            </select>
        </form>

        <div class="car-img">
            <img src="/assets/car-white.png" alt="dream-car">
        </div>
      
    </section>

    <!-- <div style="background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent); height: 8px;"></div> -->
    
    <div class="car-banner">
        <div></div>
    </div>
    
    <section>
        <div>

        </div>
    </section>

</body>

</html>
